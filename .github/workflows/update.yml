name: Update pool data

on:
  schedule:
    # Full update daily at 07:00 UTC (3 AM ET) — after overnight games finish
    - cron: "0 7 * * *"
    # Live-only refresh every 15 min during playoff season (Apr–Jun)
    - cron: "*/15 * * 4-6 *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - live-only

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "live-only" ]; then
            python update.py --live-only
          elif [ "$(date +%M)" != "00" ] && [ "$(date +%H)" != "07" ]; then
            # Non-daily cron trigger → live-only (the */15 schedule)
            python update.py --live-only
          else
            python update.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update pool data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
